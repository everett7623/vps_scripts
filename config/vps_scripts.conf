# ==============================================================================
# File: config/vps_scripts.conf
# Purpose: Shared project configuration for launchers and service modules.
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. Project metadata
# ------------------------------------------------------------------------------
SCRIPT_NAME="VPS Scripts"
SCRIPT_VERSION="2.7.0"
PROJECT_URL="https://github.com/everett7623/vps_scripts"
UPDATE_CHECK_URL="https://raw.githubusercontent.com/everett7623/vps_scripts/main/version.json"
PRIMARY_LAUNCHER_URL="https://raw.githubusercontent.com/everett7623/vps_scripts/main/vps.sh"
LEGACY_LAUNCHER_URL="https://raw.githubusercontent.com/everett7623/vps_scripts/main/vps_scripts.sh"
LAUNCHER_STYLE_VERSION="2026.06"

# ------------------------------------------------------------------------------
# 2. Paths and working directories
# ------------------------------------------------------------------------------
BASE_DIR="/root/vps_scripts"
LOG_DIR="/var/log/vps_scripts"
LOG_FILE="${LOG_DIR}/main.log"
TEMP_DIR="/tmp/vps_scripts_cache"
BACKUP_DIR="/var/backups/vps_scripts"

# ------------------------------------------------------------------------------
# 3. Logging and debug behavior
# ------------------------------------------------------------------------------
LOG_LEVEL=1
ENABLE_LOG=true
LOG_MAX_SIZE=10
DEBUG_MODE=false
ENABLE_COLOR_OUTPUT=true
ENABLE_PROGRESS_BAR=true

# ------------------------------------------------------------------------------
# 4. Launcher and execution policy
# ------------------------------------------------------------------------------
PREFER_MODULAR_LAUNCHER=true
ENABLE_LEGACY_COMPAT_LAUNCHER=true
THIRD_PARTY_CONFIRM=true
DOWNLOAD_RETRIES=3
DEFAULT_TIMEOUT=30
USE_CN_MIRROR="auto"
GLOBAL_PROXY=""

# ------------------------------------------------------------------------------
# 5. Dependency groups
# ------------------------------------------------------------------------------
BASIC_PACKAGES="curl wget git vim nano htop iotop iftop net-tools dnsutils mtr traceroute tcpdump telnet openssh-server ca-certificates gnupg lsb-release software-properties-common unzip zip tar gzip bzip2 screen tmux tree jq bc rsync cron logrotate"
NETWORK_PACKAGES="dnsutils iputils-ping mtr traceroute iperf3"
DEV_PACKAGES="build-essential gcc g++ make cmake automake autoconf libtool pkg-config python3 python3-pip python3-dev nodejs npm golang default-jdk maven ruby perl php-cli composer docker.io docker-compose ansible terraform"
MONITOR_PACKAGES="sysstat iostat vmstat dstat nmon glances nethogs iptraf-ng nload speedtest-cli sysbench stress fio"
SECURITY_PACKAGES="fail2ban ufw iptables-persistent rkhunter chkrootkit lynis aide clamav clamav-daemon"

# ------------------------------------------------------------------------------
# 6. Service installation defaults
# ------------------------------------------------------------------------------
DOCKER_INSTALL_SOURCE="official"
NGINX_VERSION="1.24.0"
MYSQL_VERSION="8.0"
PHP_VERSION="8.2"
REDIS_VERSION="7.0"
BT_PANEL_INSTALL_MODE="stable"
PANEL_1PANEL_VERSION="latest"

# ------------------------------------------------------------------------------
# 7. Benchmark and network defaults
# ------------------------------------------------------------------------------
CPU_TEST_DURATION=30
MEMORY_TEST_SIZE=1024
DISK_TEST_SIZE=1024
IP_QUALITY_API="https://api.ip.sb/geoip"
STREAMING_TEST_TIMEOUT=10
PORT_SCAN_RANGE="1-65535"

# ------------------------------------------------------------------------------
# 8. Third-party resource endpoints
# ------------------------------------------------------------------------------
FUSION_SCRIPT_URL="https://raw.githubusercontent.com/spiritLHLS/ecs/main/ecs.sh"
YABS_SCRIPT_URL="https://raw.githubusercontent.com/masonr/yet-another-bench-script/master/yabs.sh"
SPEEDTEST_SCRIPT_URL="https://raw.githubusercontent.com/spiritLHLS/speedtest-cli/main/speedtest.sh"

# ------------------------------------------------------------------------------
# 9. System optimization defaults
# ------------------------------------------------------------------------------
SYSTEM_LANG="zh_CN.UTF-8"
DEFAULT_EDITOR="nano"
DEFAULT_TIMEZONE="Asia/Shanghai"
DEFAULT_DNS_SERVERS="8.8.8.8,1.1.1.1"

SYSCTL_OPTIMIZATIONS="
net.ipv4.tcp_congestion_control=bbr
net.core.default_qdisc=fq
net.ipv4.tcp_fastopen=3
net.ipv4.tcp_syncookies=1
net.ipv4.tcp_tw_reuse=1
net.ipv4.ip_local_port_range=10000 65000
net.core.somaxconn=4096
net.ipv4.tcp_max_syn_backlog=8192
fs.file-max=1000000
"
